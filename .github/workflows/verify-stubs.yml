name: Verify generated stubs

on:
  push:
  pull_request:

jobs:
  verify-stubs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-setup-action@v1
      - name: Regenerate stubs cleanly
        run: |
          rm -rf gen/kotlin
          buf generate --template buf.gen.kotlin.yaml
      - name: Dump buf output as base64 tarball
        if: always()
        run: |
          tar -czf /tmp/stubs.tar.gz gen/kotlin
          echo "Tar size: $(wc -c < /tmp/stubs.tar.gz) bytes"
          echo "===BEGIN BUF STUBS BASE64==="
          base64 -w 76 /tmp/stubs.tar.gz
          echo "===END BUF STUBS BASE64==="
      - name: Check for drift
        id: drift
        run: |
          if [ -n "$(git status --porcelain gen/kotlin/)" ]; then
            echo "::error::gen/kotlin/ is out of sync with the proto file."
            echo "::error::Run 'buf generate --template buf.gen.kotlin.yaml' locally and commit the result."
            git status --short gen/kotlin/
            exit 1
          fi
          echo "Stubs are in sync with the proto."
