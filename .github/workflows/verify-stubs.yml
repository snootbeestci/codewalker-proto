name: Verify generated stubs

on:
  push:
  pull_request:

jobs:
  verify-stubs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-setup-action@v1
      - name: Regenerate stubs
        run: buf generate --template buf.gen.kotlin.yaml
      - name: Check for drift
        id: drift
        run: |
          if ! git diff --quiet gen/kotlin/ || [ -n "$(git ls-files --others --exclude-standard gen/kotlin/)" ]; then
            echo "::error::gen/kotlin/ is out of sync with the proto file."
            echo "::error::Run 'buf generate --template buf.gen.kotlin.yaml' locally and commit the result."
            echo "--- changed/missing files ---"
            git status --short gen/kotlin/
            echo "--- full diff ---"
            git diff gen/kotlin/
            exit 1
          fi
          echo "Stubs are in sync with the proto."
      - name: Upload regenerated stubs (on failure)
        if: failure() && steps.drift.conclusion == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: gen-kotlin-from-buf
          path: gen/kotlin/
